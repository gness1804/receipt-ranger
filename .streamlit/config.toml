[client]
# Disable the "Deploy" button in the top right
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
# Run in headless mode (no browser auto-open)
headless = true

# Listen on all interfaces for production
address = "0.0.0.0"

# Default Streamlit port (Nginx will proxy to this)
port = 8501

# XSRF and CORS protection are enabled (Streamlit defaults). The app is served
# directly by Render with no origin-rewriting reverse proxy (Cloudflare is
# DNS-only / grey-cloud), so these checks do not reject legitimate requests.
enableXsrfProtection = true
enableCORS = true

# Max upload size in MB (receipts are typically small images)
maxUploadSize = 10

# Disable static serving
enableStaticServing = false

[browser]
# Don't try to open browser on server
gatherUsageStats = false

[ui]
# Hide the deploy button and Streamlit top bar branding
hideTopBar = true

[theme]
# Graham Nessler design system — dark theme is the default canvas.
# In-app CSS overrides handle the light theme via class on the root.
base = "dark"
primaryColor = "#F5F5F5"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#171717"
textColor = "#F5F5F5"
font = "sans serif"
